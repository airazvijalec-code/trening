<style>
/* =====================================================================
 * Trening — styles
 * Mobile-first, dark theme. Section headings comment each block.
 * ===================================================================== */

:root{
  --bg:#0b0d10;
  --panel:#15181d;
  --panel2:#1c2026;
  --panel3:#242a32;
  --line:#272c33;
  --txt:#e9ecef;
  --muted:#8b949e;
  --dim:#5c6470;
  --accent:#ff5722;
  --accent-dim:#7a2c10;
  --good:#22c55e;
  --warn:#eab308;
  --bad:#ef4444;
  --radius:14px;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font:15px/1.45 -apple-system,BlinkMacSystemFont,system-ui,Segoe UI,Roboto,sans-serif;
  overscroll-behavior-y:contain;-webkit-text-size-adjust:100%}
body{padding-bottom:calc(72px + env(safe-area-inset-bottom));min-height:100vh}
button{font:inherit;color:inherit}
input,select,textarea{font:inherit;color:var(--txt);background:var(--panel2);
  border:1px solid var(--line);border-radius:10px;padding:10px 12px;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
textarea{resize:vertical;min-height:60px;width:100%}

/* ----- Header ----- */
header.app{position:sticky;top:0;background:rgba(11,13,16,.85);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);padding:14px 16px;z-index:10;
  display:flex;align-items:center;gap:10px}
.hd-stack{flex:1;min-width:0}
header.app h1{margin:0;font-size:18px;font-weight:700;letter-spacing:-.01em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
header.app .sub{color:var(--muted);font-size:12px;font-weight:500;margin-top:2px}
.icon-btn{background:var(--panel2);border:1px solid var(--line);border-radius:10px;
  width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px}
.icon-btn:active{transform:scale(.96)}

/* sync indicator */
.sync-badge{width:8px;height:8px;border-radius:50%;background:var(--dim);
  flex-shrink:0;transition:background .2s}
.sync-badge.ok{background:var(--good)}
.sync-badge.syncing{background:var(--warn);animation:pulse 1s infinite}
.sync-badge.err{background:var(--bad)}
.sync-badge.off{background:var(--dim)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ----- Draft banner ----- */
.draft-banner{background:var(--accent-dim);border-bottom:1px solid var(--accent);
  color:#fff;padding:10px 14px;font-size:13px;display:flex;align-items:center;gap:10px}
.draft-banner button{background:var(--accent);border:0;border-radius:8px;
  padding:6px 12px;font-weight:700;font-size:12px;color:#fff;cursor:pointer;flex-shrink:0}
.draft-banner .grow{flex:1}

/* ----- Layout ----- */
main{max-width:560px;margin:0 auto;padding:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px;margin-bottom:12px}
.card h2{margin:0 0 10px;font-size:13px;font-weight:700;letter-spacing:.04em;
  text-transform:uppercase;color:var(--muted)}
.row{display:flex;gap:10px;align-items:center}
.row.wrap{flex-wrap:wrap}
.spread{display:flex;justify-content:space-between;align-items:center;gap:10px}
.muted{color:var(--muted)}
.dim{color:var(--dim)}
.center{text-align:center}
.hidden{display:none!important}

/* ----- Buttons ----- */
.btn{appearance:none;border:0;background:var(--accent);color:#fff;border-radius:12px;
  padding:14px 18px;font-weight:700;font-size:15px;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.ghost{background:var(--panel2);border:1px solid var(--line);color:var(--txt)}
.btn.danger{background:#3a1a1a;color:#ff8888;border:1px solid #5a2a2a}
.btn.success{background:var(--good)}
.btn.sm{padding:8px 12px;font-size:13px;width:auto}

/* ----- Template grid ----- */
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tpl-card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;
  padding:14px;cursor:pointer;text-align:left}
.tpl-card:active{border-color:var(--accent)}
.tpl-card h3{margin:0 0 4px;font-size:14px}
.tpl-card .ex-count{color:var(--muted);font-size:12px}

/* ----- Session list ----- */
.sess-row{display:flex;align-items:center;gap:12px;padding:12px 0;
  border-bottom:1px solid var(--line);cursor:pointer}
.sess-row:last-child{border-bottom:0}
.sess-row .when{font-weight:700;width:46px;text-align:center}
.sess-row .when .d{font-size:18px}
.sess-row .when .m{font-size:10px;color:var(--muted);text-transform:uppercase}
.sess-row .body{flex:1;min-width:0}
.sess-row .ttl{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sess-row .meta{color:var(--muted);font-size:12px;margin-top:2px}

/* ----- Badges ----- */
.badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:11px;
  font-weight:700;letter-spacing:.02em}
.badge.rpe{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
.badge.knee0{background:#1a2e1a;color:#7ecf7e}
.badge.knee1{background:#3a3a1a;color:#e6d24a}
.badge.knee2{background:#3a2a14;color:#f0a050}
.badge.knee3{background:#3a1a1a;color:#ff7070}
.badge.pr{background:linear-gradient(135deg,#ff5722,#ffab91);color:#fff;
  box-shadow:0 0 8px rgba(255,87,34,.35)}

/* ----- Exercise editor ----- */
.ex-block{background:var(--panel2);border:1px solid var(--line);border-radius:12px;
  padding:12px;margin-bottom:10px}
.ex-block.has-pr{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
.ex-block .ex-name{display:flex;align-items:center;gap:8px;margin-bottom:8px;position:relative}
.ex-block .ex-name input{flex:1;background:transparent;border:0;padding:4px 0;
  font-weight:700;font-size:15px}
.ex-block .ex-name input:focus{border-bottom:1px solid var(--accent)}
.ex-block .ex-hint{color:var(--muted);font-size:11px;margin-top:-4px;margin-bottom:6px}

/* set rows */
.set-row{display:grid;grid-template-columns:30px 1fr 1fr 36px 36px;gap:6px;
  align-items:center;margin-bottom:6px}
.set-row.head{margin-bottom:4px}
.set-row.head div{color:var(--muted);font-size:10px;text-align:center;
  text-transform:uppercase;letter-spacing:.04em;font-weight:700}
.set-row .idx{color:var(--muted);font-size:12px;text-align:center;font-weight:700}
.set-row input{padding:8px 6px;text-align:center;font-weight:600;font-size:15px}
.set-row .x{background:transparent;border:0;color:var(--dim);cursor:pointer;
  font-size:18px;padding:0;text-align:center}
.set-row .done-btn{background:var(--panel3);border:1px solid var(--line);
  border-radius:8px;color:var(--muted);cursor:pointer;font-size:14px;font-weight:700;
  padding:0;height:34px}
.set-row .done-btn[data-done="true"]{background:var(--good);border-color:var(--good);color:#fff}
.set-row.set-done input{opacity:.6}

.set-add{display:flex;gap:8px;margin-top:6px;align-items:center;flex-wrap:wrap}
.opomba{margin-top:8px}
.opomba textarea{font-size:13px;min-height:42px}

/* autocomplete dropdown */
.ac-list{position:absolute;top:100%;left:0;right:30px;background:var(--panel3);
  border:1px solid var(--line);border-radius:10px;z-index:5;max-height:200px;
  overflow-y:auto;margin-top:4px;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.ac-list button{display:block;width:100%;text-align:left;background:transparent;
  border:0;padding:10px 12px;color:var(--txt);font-size:14px;cursor:pointer;
  border-bottom:1px solid var(--line)}
.ac-list button:last-child{border-bottom:0}
.ac-list button:hover,.ac-list button:focus{background:var(--panel2)}

/* ----- Knee row ----- */
.knee-row{display:flex;gap:6px}
.knee-btn{flex:1;background:var(--panel2);border:1px solid var(--line);
  border-radius:10px;padding:10px 0;font-weight:700;cursor:pointer}
.knee-btn[data-active="true"][data-v="0"]{background:#1a2e1a;border-color:#3a6e3a;color:#7ecf7e}
.knee-btn[data-active="true"][data-v="1"]{background:#3a3a1a;border-color:#7e6e1a;color:#e6d24a}
.knee-btn[data-active="true"][data-v="2"]{background:#3a2a14;border-color:#7e5614;color:#f0a050}
.knee-btn[data-active="true"][data-v="3"]{background:#3a1a1a;border-color:#7e1a1a;color:#ff7070}

/* ----- RPE ----- */
.rpe-row{display:grid;grid-template-columns:repeat(10,1fr);gap:4px}
.rpe-btn{background:var(--panel2);border:1px solid var(--line);border-radius:8px;
  padding:8px 0;text-align:center;font-weight:700;font-size:13px;cursor:pointer}
.rpe-btn[data-active="true"]{background:var(--accent);border-color:var(--accent);color:#fff}

/* ----- Tab nav ----- */
nav.tab{position:fixed;left:0;right:0;bottom:0;background:rgba(11,13,16,.95);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-top:1px solid var(--line);display:flex;
  padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:20}
nav.tab a{flex:1;text-align:center;color:var(--muted);text-decoration:none;
  font-size:11px;padding:6px 4px;font-weight:600}
nav.tab a .ico{display:block;font-size:20px;margin-bottom:2px}
nav.tab a[data-active="true"]{color:var(--accent)}

/* ----- Toasts / feedback ----- */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--accent);color:#fff;padding:10px 16px;border-radius:10px;
  font-weight:700;font-size:13px;z-index:30;animation:fade .25s;
  max-width:90%;text-align:center}
.toast.warn{background:var(--warn);color:#000}
.toast.err{background:var(--bad)}
@keyframes fade{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}

/* PR celebration */
.pr-flash{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:60;
  display:flex;align-items:center;justify-content:center;animation:fadeBg .2s;
  flex-direction:column;gap:14px}
.pr-flash .pr-medal{font-size:88px;animation:scaleIn .35s cubic-bezier(.2,1.4,.4,1)}
.pr-flash .pr-text{color:#fff;font-size:22px;font-weight:800;text-align:center;
  padding:0 30px;text-shadow:0 2px 12px rgba(255,87,34,.5)}
.pr-flash .pr-num{color:var(--accent);font-size:36px;font-weight:900;letter-spacing:-.02em}
@keyframes fadeBg{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{0%{transform:scale(0) rotate(-30deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}

/* ----- Form fields ----- */
.field{display:block;margin-bottom:10px}
.field label{display:block;color:var(--muted);font-size:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* ----- Stats ----- */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:10px;
  padding:10px;text-align:center}
.stat .v{font-size:18px;font-weight:800}
.stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;
  letter-spacing:.04em;font-weight:700;margin-top:2px}
.empty{color:var(--muted);text-align:center;padding:30px 10px}

/* ----- Charts ----- */
.chart-wrap{background:var(--panel2);border:1px solid var(--line);border-radius:12px;
  padding:12px;margin-bottom:10px}
.chart-wrap svg{display:block;width:100%;height:auto}
.chart-tabs{display:flex;gap:6px;margin-bottom:10px}
.chart-tabs button{flex:1;background:var(--panel2);border:1px solid var(--line);
  border-radius:8px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted)}
.chart-tabs button[data-active="true"]{background:var(--accent);border-color:var(--accent);color:#fff}

/* ----- Sheet (modal) ----- */
.sheet{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;
  display:flex;align-items:flex-end}
.sheet .panel{background:var(--panel);width:100%;max-width:560px;margin:0 auto;
  border-radius:16px 16px 0 0;padding:18px 14px calc(18px + env(safe-area-inset-bottom));
  animation:slup .2s;max-height:85vh;overflow-y:auto}
@keyframes slup{from{transform:translateY(40px)}to{transform:translateY(0)}}
.sheet .panel button.menu-item{width:100%;text-align:left;padding:14px 12px;
  background:transparent;border:0;color:var(--txt);font-size:15px;
  border-bottom:1px solid var(--line);cursor:pointer}
.sheet .panel button.menu-item:last-child{border-bottom:0}

/* ----- Rest timer ----- */
.timer-bar{position:fixed;left:0;right:0;bottom:calc(72px + env(safe-area-inset-bottom));
  background:var(--accent);color:#fff;padding:12px 16px;display:flex;align-items:center;
  gap:14px;z-index:25;font-weight:800;animation:slup .2s}
.timer-bar .t-time{font-size:24px;font-variant-numeric:tabular-nums;min-width:64px}
.timer-bar .t-label{flex:1;font-size:13px;font-weight:600;opacity:.9}
.timer-bar button{background:rgba(0,0,0,.25);border:0;color:#fff;border-radius:8px;
  padding:8px 12px;font-weight:700;cursor:pointer}
.timer-bar.warn{background:var(--warn);color:#000}
.timer-bar.done{background:var(--good);animation:flash .5s 3}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.5}}

/* search/filter row */
.filter-row{display:flex;gap:8px;margin-bottom:12px}
.filter-row input{flex:1}
.chip{display:inline-block;padding:6px 10px;border-radius:16px;background:var(--panel2);
  border:1px solid var(--line);font-size:12px;font-weight:600;cursor:pointer;color:var(--muted)}
.chip[data-active="true"]{background:var(--accent);border-color:var(--accent);color:#fff}

/* ----- Settings ----- */
.set-section{margin-bottom:18px}
.set-section h3{margin:0 0 8px;font-size:13px;color:var(--muted);
  text-transform:uppercase;letter-spacing:.04em;font-weight:700}
.set-help{color:var(--muted);font-size:12px;line-height:1.5;margin:6px 0}
.set-help a{color:var(--accent)}
.kv{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
.kv:last-child{border-bottom:0}
.kv .k{color:var(--muted);font-size:13px}
.kv .v{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}

</style>
</head>

<script>
(()=>{
const __M = {};
/* state/normalize.js */
{
/* =====================================================================
 * normalize.js — exercise name canonicalization
 *
 * Two distinct concerns:
 *   - display name: what the user typed, preserved for UI ("Leg pres notraj")
 *   - canonical name: lowercased, whitespace-collapsed, accent-folded —
 *     used for grouping in progression charts and autocomplete matching.
 *
 * Why fold diacritics? Because users type "Počep" sometimes and "Pocep"
 * other times when in a hurry. Same exercise.
 * ===================================================================== */

/**
 * Convert a name to a canonical key used for matching.
 *   "Leg pres  Široko" → "leg pres siroko"
 *   "Počep " → "pocep"
 */
function canonical(name) {
  if (!name) return '';
  return String(name)
    .normalize('NFD')                        // decompose accents
    .replace(/[̀-ͯ]/g, '')         // strip combining marks
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, ' ')             // collapse non-alnum to single space
    .trim();
}

/**
 * Levenshtein distance — used to suggest "did you mean X?" when typing.
 * Capped at maxDist for early termination on long strings.
 */
function lev(a, b, maxDist = 4) {
  if (a === b) return 0;
  if (!a) return b.length;
  if (!b) return a.length;
  if (Math.abs(a.length - b.length) > maxDist) return maxDist + 1;

  const m = a.length, n = b.length;
  let prev = new Array(n + 1);
  let curr = new Array(n + 1);
  for (let j = 0; j <= n; j++) prev[j] = j;
  for (let i = 1; i <= m; i++) {
    curr[0] = i;
    let rowMin = i;
    for (let j = 1; j <= n; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      curr[j] = Math.min(curr[j - 1] + 1, prev[j] + 1, prev[j - 1] + cost);
      if (curr[j] < rowMin) rowMin = curr[j];
    }
    if (rowMin > maxDist) return maxDist + 1; // early bail
    [prev, curr] = [curr, prev];
  }
  return prev[n];
}

/**
 * Find best fuzzy matches for an input across known names.
 * Returns up to `limit` candidates ranked by combined prefix + distance score.
 */
function fuzzyMatch(input, knownNames, limit = 6) {
  const q = canonical(input);
  if (!q) return knownNames.slice(0, limit);
  const scored = knownNames
    .map(n => {
      const c = canonical(n);
      if (!c) return { n, score: 999 };
      let score = lev(q, c, 8);
      if (c.startsWith(q)) score -= 4;
      else if (c.includes(q)) score -= 2;
      return { n, c, score };
    })
    .filter(x => x.score < 8)
    .sort((a, b) => a.score - b.score);
  return scored.slice(0, limit).map(x => x.n);
}

__M["state/normalize.js"] = { canonical, lev, fuzzyMatch };
}
/* state/schema.js */
{
/* =====================================================================
 * schema.js — data shape + versioned migrations
 *
 * v1: legacy localStorage 'trening_data_v1' (the v0.1 app)
 *      sessions: [{id?, date, type, durationMin, rpe, kneePain,
 *                  exercises:[{name, sets:[{reps,weight}], note}],
 *                  comment}]
 *      templates: { typeName: [exerciseNames] }
 *
 * v2 (current): adds stable IDs to exercises/sets, draft slot for active
 *      session, settings (sync), bodyweight log, normalized exercise
 *      names. Touch-stamp every record with createdAt/updatedAt for
 *      conflict resolution.
 * ===================================================================== */

const { canonical } = __M["state/normalize.js"];

const SCHEMA_VERSION = 2;

/** Storage keys */
const KEYS = {
  V1: 'trening_data_v1',     // legacy
  V2: 'trening_data_v2',     // current
  TOKEN: 'trening_gist_token', // separate from main blob (never synced)
};

/** Generate a short stable id. */
let _idCounter = 0;
function uid(prefix = '') {
  _idCounter = (_idCounter + 1) & 0xffff;
  return prefix + Date.now().toString(36) + _idCounter.toString(36);
}

/** Build a fresh empty state. */
function emptyState() {
  return {
    version: SCHEMA_VERSION,
    sessions: [],
    templates: {},
    bodyweight: [],
    draft: null,
    settings: {
      sync: { type: 'none', gistId: '', lastSyncedAt: 0 },
      restDefault: 90,         // default rest seconds
      timerSound: true,
      timerHaptic: true,
    },
    updatedAt: Date.now(),
  };
}

/** Build a fresh session object (used by editor + new). */
function newSession({ type = '', date = todayISO(), exerciseNames = [] } = {}) {
  return {
    id: uid('s_'),
    date,
    type,
    durationMin: null,
    rpe: null,
    kneePain: 0,
    bodyweight: null,
    exercises: exerciseNames.map(n => newExercise(n)),
    comment: '',
    startedAt: Date.now(),
    createdAt: Date.now(),
    updatedAt: Date.now(),
  };
}

function newExercise(name = '') {
  return {
    id: uid('e_'),
    name,
    canonical: canonical(name),
    note: '',
    sets: [newSet()],
  };
}

function newSet() {
  return {
    id: uid('x_'),
    reps: '',

  const prior = buildPRIndex(allSessions.filter(s =>

    }

const { store } = __M["state/store.js"];

let _selCanonical = '';

function render(container, router) {
  document.getElementById('title').textContent = 'Progres';
  document.getElementById('subtitle').textContent = 'Razvoj po vajah';

  const sessions = [...store.state.sessions].sort((a, b) => a.date.localeCompare(b.date));

  // Build per-exercise data
  const byEx = {};   // canonical → { name, points: [{date, weight, reps}] }
  for (const s of sessions) {
    for (const e of (s.exercises || [])) {
      const c = e.canonical || canonical(e.name);
      if (!c) continue;
      const slot = byEx[c] || (byEx[c] = { name: e.name, points: [] });
      slot.name = e.name; // keep most recent display name
      let topW = 0, topReps = 0, vol = 0;
      for (const x of (e.sets || [])) {
        const w = Number(x.weight) || 0, r = Number(x.reps) || 0;
        vol += w * r;
        if (w > topW) { topW = w; topReps = r; }
      }
      slot.points.push({
        date: s.date, weight: topW, reps: topReps,
        e1rm: estimate1RM(topW, topReps) || 0,
        volume: vol, rpe: s.rpe,
      });
    }
  }
  const names = Object.entries(byEx)
    .filter(([, v]) => v.points.some(p => p.weight > 0 || p.volume > 0))
    .sort(([, a], [, b]) => a.name.localeCompare(b.name));

  if (!names.length) {
    container.innerHTML = `<div class="card empty">Ni dovolj podatkov za graf.</div>`;
    return;
  }

  if (!_selCanonical || !byEx[_selCanonical]) _selCanonical = names[0][0];
  const data = byEx[_selCanonical].points;

  let html = `<div class="card">
    <div class="field">
      <label>Vaja</label>
      <select id="exSel">${names.map(([c, v]) =>
        `<option value="${esc(c)}" ${c===_selCanonical?'selected':''}>${esc(v.name)}</option>`
      ).join('')}</select>
    </div>
    <div class="chart-tabs">
      <button data-mode="top" data-active="${_mode==='top'}">Top teža</button>
      <button data-mode="e1rm" data-active="${_mode==='e1rm'}">Ocenjen 1RM</button>
      <button data-mode="volume" data-active="${_mode==='volume'}">Volumen</button>
    </div>
  </div>`;

  /* stats strip */
  const last = data[data.length - 1] || {};
  const prev = data[data.length - 2] || {};
  const peakW = data.reduce((a, b) => b.weight > (a.weight||0) ? b : a, {});
  const peakE = data.reduce((a, b) => b.e1rm > (a.e1rm||0) ? b : a, {});
  const delta = (last.weight || 0) - (prev.weight || 0);

  html += `<div class="stat-grid">
    <div class="stat"><div class="v">${peakW.weight||'–'}<span style="font-size:12px">kg</span></div><div class="l">PR (teža)</div></div>
    <div class="stat"><div class="v">${peakE.e1rm ? peakE.e1rm.toFixed(0) : '–'}<span style="font-size:12px">kg</span></div><div class="l">PR (1RM)</div></div>
    <div class="stat"><div class="v" style="color:${delta>0?'var(--good)':delta<0?'var(--bad)':'var(--txt)'}">${delta>0?'+':''}${delta||0}</div><div class="l">vs prej</div></div>
  </div>`;

  /* chart */
  let chartData;
  if (_mode === 'top')        chartData = data.map(d => ({ x: d.date, y: d.weight }));
  else if (_mode === 'e1rm')  chartData = data.map(d => ({ x: d.date, y: d.e1rm }));
  else                        chartData = data.map(d => ({ x: d.date, y: d.volume }));
  chartData = chartData.filter(d => d.y > 0);

  html += `<div class="chart-wrap">${
    _mode === 'volume' ? barChart(chartData) : lineChart(chartData)
  }</div>`;

  html += `<div class="card"><h2>Zgodovina vaje</h2>`;
  for (const d of [...data].reverse()) {
    const isPR = d === peakW;
    html += `<div class="sess-row" style="cursor:default">
      <div class="when"><div class="d">${new Date(d.date).getDate()}</div>
        <div class="m">${SL.months[new Date(d.date).getMonth()]}</div></div>
      <div class="body">
        <div class="ttl">${d.reps ?? '–'} × ${d.weight} kg</div>
        <div class="meta">${d.date} · 1RM ≈ ${d.e1rm.toFixed(0)} · vol ${d.volume.toFixed(0)} · RPE ${d.rpe||'–'}</div>
      </div>
      ${isPR ? '<span class="badge pr">★ PR</span>' : ''}
    </div>`;
  }
  html += `</div>`;

  container.innerHTML = html;

  container.querySelector('#exSel').addEventListener('change', e => {
    _selCanonical = e.target.value;
    render(container, router);
  });
  container.querySelectorAll('[data-mode]').forEach(b => b.addEventListener('click', () => {
    _mode = b.dataset.mode;
    render(container, router);
  }));
}

        ${token ? `<button class="btn danger sm" id="tokClear">Pobriši</button>` : ''}
      </div>
      <div class="kv"><span class="k">Status</span><span class="v" id="syncStatus">${esc(syncDescribe(sync, token))}</span></div>
      <div class="kv"><span class="k">Token</span><span class="v">${tokenMask || '—'}</span></div>
      <div class="kv"><span class="k">Gist ID</span><span class="v">${esc(sync.gistId || '—')}</span></div>
      <div class="kv"><span class="k">Zadnja sinhronizacija</span><span class="v">${relTime(sync.lastSyncedAt)}</span></div>
      <div class="row" style="gap:8px;margin-top:10px">
        <button class="btn ghost sm" id="syncPull">⤓ Potegni</button>
        <button class="btn ghost sm" id="syncPush">⤒ Pošlji</button>
      </div>
    </div>

    <div class="set-section">
      <h3>Trening</h3>
      <div class="field">
        <label>Privzet počitek (sek)</label>
        <input type="number" id="restDef" value="${st.settings.restDefault || 90}" min="0" step="5">
      </div>
      <div class="row" style="gap:14px;margin-top:6px">
        <label class="row" style="gap:6px"><input type="checkbox" id="snd" ${st.settings.timerSound!==false?'checked':''}> Pisk</label>
        <label class="row" style="gap:6px"><input type="checkbox" id="hap" ${st.settings.timerHaptic!==false?'checked':''}> Vibracija</label>
      </div>
    </div>

    <div class="set-section">
      <h3>Podatki</h3>
      <button class="menu-item" id="exp">⤓ Izvozi vse v JSON</button>
      <button class="menu-item" id="imp">⤒ Uvozi JSON (zamenja vse)</button>
      <button class="menu-item" id="rst" style="color:#ff7070">✕ Pobriši vse</button>
    </div>

    <button class="btn ghost" id="closeBtn" style="margin-top:8px">Zapri</button>
  </div>`;

  bind();
}

function syncDescribe(sync, token) {
  if (!token) return 'Brez tokena';
  if (!sync.gistId) return 'Token OK, gist še ni ustvarjen';
  return 'Aktivno';
}

function bind() {
  const $ = sel => _sheet.querySelector(sel);
  $('#closeBtn').onclick = close;

  $('#tokSave').onclick = () => {
    const v = $('#tokIn').value.trim();
    localStorage.setItem(KEYS.TOKEN, v);
    toast('Shranjeno');
    rerender();
    // trigger initial sync if newly added
    store.pushNow().catch(e => toast('Push napaka: ' + e.message, 'err'));
  };
  $('#tokTest').onclick = async () => {
    try {
      const u = await store.sync.testToken();
      toast('OK — ' + (u.login || 'auth velja'));
    } catch (e) {
      toast(e.message, 'err');
    }
  };
  $('#tokClear')?.addEventListener('click', () => {
    if (!confirm2('Pobrišem token?')) return;
    localStorage.removeItem(KEYS.TOKEN);
    rerender();
    toast('Pobrisano');
  });

  $('#syncPull').onclick = async () => {
    try {
      const r = await store.pullNow();
      toast(r ? 'Potegnjeno' : 'Nič novega');
      rerender();
    } catch (e) { toast('Napaka: ' + e.message, 'err'); }
  };
  $('#syncPush').onclick = async () => {
    try {
      await store.pushNow();
      toast('Poslano');
      rerender();
    } catch (e) { toast('Napaka: ' + e.message, 'err'); }
  };

  $('#restDef').addEventListener('input', e => {
    store.update(s => { s.settings.restDefault = +e.target.value || 0; });
  });
  $('#snd').addEventListener('change', e => {
    store.update(s => { s.settings.timerSound = e.target.checked; });
  });
  $('#hap').addEventListener('change', e => {
    store.update(s => { s.settings.timerHaptic = e.target.checked; });
  });

  $('#exp').onclick = () => {
    const data = JSON.stringify(store.state, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `trening-${todayISO()}.json`;
    a.click(); URL.revokeObjectURL(url);
    toast('Izvoženo');
  };
  $('#imp').onclick = () => {
    document.getElementById('fileIn').click();
    close();
  };
  $('#rst').onclick = () => {
    if (!confirm2('Pobrišem VSE podatke (lokalno)?')) return;
    if (!confirm2('Resno?')) return;
    store.replaceAll({ sessions: [], templates: {}, bodyweight: [] });
    toast('Pobrisano');
    close();
  };
}

__M["views/settings.js"] = { openSettings };

/* main.js */
{
/* =====================================================================
 * main.js — bootstrap, router, draft recovery, header sync indicator
 * ===================================================================== */

const { store } = __M["state/store.js"];
const { GistAdapter } = __M["sync/gist.js"];
const { mountTimerBar } = __M["lib/timer.js"];
const { toast, fmtDate } = __M["lib/dom.js"];

// views
const home = __M["views/home.js"];
const nv = __M["views/new.js"];
const active = __M["views/active.js"];
const history = __M["views/history.js"];
const detail = __M["views/detail.js"];
const progress = __M["views/progress.js"];
const { openSettings } = __M["views/settings.js"];

const SEED = {"sessions":[],"templates":{},"bodyweight":[]}
;

/* ========== router ========== */

const router = {
  view: 'home',
  param: null,
  go(view, param) {
    this.view = view; this.param = param;
    document.querySelectorAll('nav.tab a').forEach(a => {
      const v = a.dataset.go;
      a.dataset.active = (
        view === v ||
        (view === 'active' && v === 'new') ||
        (view === 'detail' && v === 'history')
      );
    });
    rerender();
    window.scrollTo(0, 0);
  },
};

const app = document.getElementById('app');

function rerender() {
  switch (router.view) {
    case 'home': return home.render(app, router);
    case 'new': return nv.render(app, router);
    case 'active': return active.render(app, router);
    case 'history': return history.render(app, router);
    case 'detail': return detail.render(app, router, router.param);
    case 'progress': return progress.render(app, router);
  }
}

/* ========== draft recovery banner ========== */

function updateDraftBanner() {
  const el = document.getElementById('draftBanner');
  const d = store.state.draft;
  if (!d) { el.classList.add('hidden'); el.innerHTML = ''; return; }
  // hide while actually editing the draft
  if (router.view === 'active') { el.classList.add('hidden'); return; }
  el.classList.remove('hidden');
  const when = new Date(d.startedAt || Date.now()).toLocaleTimeString('sl-SI', { hour: '2-digit', minute: '2-digit' });
  el.innerHTML = `
    <div class="grow">📝 Nedokončan trening (${when}) — ${escapeHtml(d.type || 'brez tipa')}</div>
    <button id="dResume">Nadaljuj</button>
    <button id="dDiscard" style="background:rgba(0,0,0,.3)">×</button>`;
  el.querySelector('#dResume').onclick = () => router.go('active');
  el.querySelector('#dDiscard').onclick = () => {
    if (!confirm('Zavrži osnutek?')) return;
    store.update(s => { s.draft = null; });
  };
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[<>&"']/g, c =>
    ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&#39;' }[c]));
}

/* ========== sync badge ========== */

function updateSyncBadge() {
  const b = document.getElementById('syncBadge');
  b.className = 'sync-badge ' + (store.syncStatus || 'off');
  b.title = ({
    ok: 'Sinhronizirano',
    syncing: 'Pošiljam…',
    err: 'Napaka pri sinhronizaciji',
    off: 'Brez sinhronizacije',
  })[store.syncStatus] || '';
}

/* ========== bootstrap ========== */

function init() {
  // Initialize store with optional seed for first-run
  store.init(SEED);

  // Wire sync adapter
  store.sync = new GistAdapter(() => store.state);
  if (store.sync.isConfigured()) store.setSyncStatus('ok');
  else store.setSyncStatus('off');

  // Subscribe — re-render current view on data change
  store.subscribe((state, kind) => {
    if (kind === 'data') {
      rerender();
      updateDraftBanner();
    } else if (kind === 'sync') {
      updateSyncBadge();
    }
  });

  // Mount the rest timer bar (always present, hidden when idle)
  mountTimerBar();

  // Tab nav
  document.querySelectorAll('nav.tab a').forEach(a =>
    a.addEventListener('click', e => {
      e.preventDefault();
      router.go(a.dataset.go);
    }));

  // Header buttons
  document.getElementById('menuBtn').addEventListener('click', openSettings);

  // Import file picker
  document.getElementById('fileIn').addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const j = JSON.parse(r.target.result);
        if (!j.sessions) throw new Error('Manjka "sessions"');
        store.replaceAll(j);
        toast('Uvoženo');
        router.go('home');
      } catch (err) { toast('Napaka pri uvozu: ' + err.message, 'err'); }
    };
    r.readAsText(f);
    e.target.value = '';
  });

  // Initial pull if we have sync configured
  if (store.sync.isConfigured() && store.state.settings.sync.gistId) {
    store.pullNow().catch(e => console.warn('initial pull failed', e));
  }

  // First render
  router.go('home');
  updateDraftBanner();
  updateSyncBadge();
}

init();
